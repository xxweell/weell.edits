<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Well</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500&display=swap');

  :root{
    --bg: #0b0b0d;
    --card: #16161a;
    --card-border: #26262b;
    --yellow: #f4c430;
    --text: #f2f2f0;
    --text-dim: #94949a;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 64px 20px;
  }

  .page{
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .avatar{
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Sora', sans-serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--yellow);
    position: relative;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .avatar img{
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .avatar::after{
    content: '';
    position: absolute;
    top: -3px; right: -3px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--yellow);
    box-shadow: 0 0 0 3px var(--bg);
  }

  h1{
    font-family: 'Sora', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }

  .tagline{
    color: var(--text-dim);
    font-size: 14px;
    margin-top: 6px;
    margin-bottom: 40px;
    text-align: center;
  }

  .links{
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-card{
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 16px 18px;
    text-decoration: none;
    color: var(--text);
    overflow: hidden;
    transition: border-color 0.2s ease, transform 0.15s ease;
  }

  .link-card:hover{
    border-color: var(--yellow);
    transform: translateY(-1px);
  }

  /* marcador tipo "playhead" de timeline, desliza da esquerda no hover */
  .link-card::before{
    content:'';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--yellow);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.25s ease;
  }

  .link-card:hover::before{
    transform: scaleY(1);
  }

  .icon{
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    stroke: var(--text-dim);
    fill: none;
    stroke-width: 1.6;
    transition: stroke 0.2s ease;
  }

  .link-card:hover .icon{
    stroke: var(--yellow);
  }

  .label{
    font-size: 15px;
    font-weight: 500;
  }

  .sub{
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 1px;
  }

  footer{
    margin-top: 48px;
    font-size: 12px;
    color: #4a4a4f;
  }
</style>
</head>
<body>

<div class="page">
  <!-- Troque "foto.jpg" pelo nome do arquivo da sua foto (deixe a imagem na mesma pasta do index.html) -->
  <div class="avatar"><img src="foto.jpg" alt="weell.edits"></div>
  <h1>weell.edits</h1>
  <p class="tagline">Edição de vídeos &amp; achados Shopee</p>

  <div class="links" id="links"></div>

  <footer>feito por Well</footer>
</div>

<script>
  // ===================================================
  // EDITE AQUI: troque as URLs pelos seus links reais
  // ===================================================
  const LINKS = [
    {
      label: "Portfólio de vídeos",
      sub: "Meus trabalhos de edição",
      url: "https://vimeo.com/showcase/12336100?fl=so&fe=fs",
      icon: "play"
    },
    {
      label: "Instagram",
      sub: "@weell.edits",
      url: "https://instagram.com/weell.edits",
      icon: "instagram"
    },
    {
      label: "Meus achados na Shopee",
      sub: "Produtos que eu recomendo",
      url: "https://br.shp.ee/358k38oo?smtt=0.0.9",
      icon: "tag"
    },
    {
      label: "WhatsApp",
      sub: "Fala comigo",
      url: "https://wa.me/5532991628336",
      icon: "chat"
    }
  ];

  const ICONS = {
    play: '<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M10 8.5l5 3.5-5 3.5z" fill="currentColor" stroke="none"/></svg>',
    instagram: '<svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.2" cy="6.8" r="1" fill="currentColor" stroke="none"/></svg>',
    tag: '<svg class="icon" viewBox="0 0 24 24"><path d="M20 12l-8 8-9-9V4h7z"/><circle cx="7.5" cy="7.5" r="1.5"/></svg>',
    chat: '<svg class="icon" viewBox="0 0 24 24"><path d="M21 11.5a8.5 8.5 0 1 1-3.8-7.1L21 3l-1.3 3.8A8.4 8.4 0 0 1 21 11.5z"/></svg>'
  };

  const container = document.getElementById('links');

  LINKS.forEach(link => {
    const a = document.createElement('a');
    a.className = 'link-card';
    a.href = link.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';

    a.innerHTML = `
      ${ICONS[link.icon] || ''}
      <div>
        <div class="label">${link.label}</div>
        <div class="sub">${link.sub}</div>
      </div>
    `;

    container.appendChild(a);
  });
</script>

</body>
</html>
